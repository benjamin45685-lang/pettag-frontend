<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <title>PetTag - Login</title>
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <img src="assets/images/horlogo.png" alt="PetTag" class="login-logo" />
      <h1>Bienvenido a PetTag</h1>
      <p id="authSubtitle">Ingresa para administrar tus placas QR y el monitoreo GPS.</p>

      <div class="auth-switch" role="tablist" aria-label="Acceso">
        <button type="button" class="auth-switch-btn active" data-auth-mode="login" aria-pressed="true">Entrar</button>
        <button type="button" class="auth-switch-btn" data-auth-mode="register" aria-pressed="false">Registrarse</button>
      </div>

      <form id="loginForm" class="login-form" autocomplete="on">
        <div class="register-only hidden" data-register-only>
          <label for="name">Nombre completo</label>
          <input id="name" name="name" type="text" class="field" placeholder="Carlos Mendoza" autocomplete="name" />
        </div>

        <label for="email">Correo</label>
        <input id="email" name="email" type="email" class="field" placeholder="carlos.mendoza@pettag.pe" autocomplete="username email" required />

        <label for="password">Contrasena</label>
        <input id="password" name="password" type="password" class="field" placeholder="********" autocomplete="current-password" required />

        <div class="register-only hidden" data-register-only>
          <label for="confirmPassword">Confirmar contrasena</label>
          <input id="confirmPassword" name="confirmPassword" type="password" class="field" placeholder="********" autocomplete="new-password" />
        </div>

        <div class="register-only hidden" data-register-only>
          <label for="phone">Telefono</label>
          <input id="phone" name="phone" type="text" class="field" placeholder="+51 999 999 999" autocomplete="tel" />
        </div>

        <div class="register-only hidden" data-register-only>
          <label for="district">Distrito</label>
          <input id="district" name="district" type="text" class="field" placeholder="Miraflores" autocomplete="address-level2" />
        </div>

        <button type="submit" class="action-btn login-btn">Entrar</button>
      </form>

      <p id="loginError" class="login-error" aria-live="polite"></p>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
