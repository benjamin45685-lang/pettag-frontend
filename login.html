<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <title>PetTag - Login</title>
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <img src="assets/images/horlogo.png" alt="PetTag" class="login-logo" />
      <h1>Bienvenido a PetTag</h1>
      <p>Ingresa para administrar tus placas QR y el monitoreo GPS.</p>

      <form id="loginForm" class="login-form" autocomplete="on">
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" class="field" placeholder="carlos.mendoza@pettag.pe" autocomplete="username email" required />

        <label for="password">Contrasena</label>
        <input id="password" name="password" type="password" class="field" placeholder="********" autocomplete="current-password" required />

        <button type="submit" class="action-btn login-btn">Entrar</button>
      </form>

      <p id="loginError" class="login-error" aria-live="polite"></p>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
