<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <title>PetTag - Escaneo Publico</title>
  <link rel="stylesheet" href="/styles/public-scan.css" />
</head>
<body>
  <main class="login-page public-scan-page">
    <section class="login-card public-scan-card">
      <img src="/assets/images/horlogo.png" alt="PetTag" class="login-logo" />
      <div id="scanState" class="scan-state" aria-live="polite"></div>

      <button id="shareBtn" type="button" class="action-btn login-btn scan-share-btn" disabled>
        COMPARTIR MI UBICACION
      </button>

      <article id="petCard" class="card public-pet-card" style="text-align: left; display: none; margin-top: 14px;"></article>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/public-scan.js"></script>
</body>
</html>
