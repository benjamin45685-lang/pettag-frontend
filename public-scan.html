<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <title>PetTag - Escaneo Publico</title>
  <link rel="stylesheet" href="/styles/app.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card" style="max-width: 680px;">
      <img src="/assets/images/horlogo.png" alt="PetTag" class="login-logo" />
      <h1>Mascota identificada</h1>
      <p>Si encontraste esta mascota, comparte tu ubicacion para ayudar al propietario.</p>

      <div id="scanState" class="login-error" aria-live="polite"></div>

      <article id="petCard" class="card" style="text-align: left; display: none; margin-top: 14px;"></article>

      <button id="shareBtn" type="button" class="action-btn login-btn" disabled>
        Compartir mi ubicacion
      </button>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/public-scan.js"></script>
</body>
</html>
